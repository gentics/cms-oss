<gtx-form-element-container
    [disabled]="disabled"
    [focusable]="true"
    [clickable]="true"
    (boxClick)="showModal()"
    (focus)="handleFocus()"
    (blur)="handleBlur()"
>
    @if (label) {
        <label (click)="showModal()">{{ label }}</label>
    }

    <span
        class="display-value"
        [attr.data-value]="value"
        [class.placeholder]="!displayValue"
    >{{ displayValue || placeholder }}</span>

    @if (clearable == null ? !required : clearable) {
        <button
            class="addon-button clear-button icon-alert"
            data-action="clear"
            [disabled]="disabled"
            (click)="clearDateTime()"
        >
            <icon>clear</icon>
        </button>
    }
</gtx-form-element-container>
