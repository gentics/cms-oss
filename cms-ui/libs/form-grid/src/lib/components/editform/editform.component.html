<div class="editor-shell">
  <header class="editor-navbar">
    <div class="navbar-left">
      <a
        routerLink=""
        class="nav-link nav-back"
        aria-label="Zurück zur Übersicht"
      >
        <span class="nav-back__icon" aria-hidden="true">←</span>
        <span class="nav-back__text">Zurück</span>
      </a>
    </div>

    <div class="navbar-center" aria-label="Ansicht umschalten">
      <div class="mode-switch" role="tablist">
        <button
          type="button"
          class="mode-switch__btn"
          [class.is-active]="viewMode === 'editor'"
          (click)="setViewMode('editor')"
          role="tab"
          [attr.aria-selected]="viewMode === 'editor'"
        >
          Editor
        </button>
        <button
          type="button"
          class="mode-switch__btn"
          [class.is-active]="viewMode === 'preview'"
          (click)="setViewMode('preview')"
          role="tab"
          [attr.aria-selected]="viewMode === 'preview'"
        >
          Vorschau
        </button>
      </div>
    </div>

    <div class="navbar-actions">
      <nav
        class="page-switcher"
        *ngIf="pages?.length && pages.length > 1"
        aria-label="Seiten wechseln"
      >
        <button
          type="button"
          class="page-switcher__btn"
          (click)="changePage(-1)"
          [disabled]="pageIndex === 0"
          [attr.aria-disabled]="pageIndex === 0"
          aria-label="Vorherige Seite"
        >
          <span class="page-switcher__icon" aria-hidden="true"
            ><i class="material-icons" aria-hidden="true">chevron_left</i></span
          >
        </button>

        <div class="page-switcher__meta" aria-live="polite">
          <span class="page-switcher__label">Seite</span>
          <span class="page-switcher__value">{{ pageIndex + 1 }}</span>
          <span class="page-switcher__sep">/</span>
          <span class="page-switcher__total">{{ pages.length }}</span>
        </div>

        <button
          type="button"
          class="page-switcher__btn"
          (click)="changePage(1)"
          [disabled]="pageIndex === pages.length - 1"
          [attr.aria-disabled]="pageIndex === pages.length - 1"
          aria-label="Nächste Seite"
        >
          <span class="page-switcher__icon" aria-hidden="true"
            ><i class="material-icons" aria-hidden="true"
              >chevron_right</i
            ></span
          >
        </button>
      </nav>

      <gtx-button icon type="regular" class="nav-save" (click)="save()">
        <i class="material-icons" aria-hidden="true">cloud_upload</i>
        <span>Veröffentlichen</span>
      </gtx-button>
    </div>
  </header>

  <andp-editor-form
    *ngIf="viewMode === 'editor'"
    [ctx]="this"
  ></andp-editor-form>

  <andp-preview-form
    *ngIf="viewMode === 'preview'"
    [formId]="previewFormId"
    [formJson]="previewFormJson"
    [featuresJson]="previewFeaturesJson"
    [language]="previewLanguage"
    [remountToken]="previewRemountToken"
    [scriptSources]="['assets/form-preview/formgen.js']"
    [currentPage]="previewCurrentPage"
    [selectedElementId]="selectedElementId"
    [selectedElementDraft]="selectedElementDraft"
    [selectedElementSchema]="selectedElementSchema"
    [isSelectedFormgridElement]="isSelectedFormgridElement"
    [isSelectedNormalElement]="isSelectedNormalElement"
    [items]="items"
    [buildDependsOnOptions]="buildDependsOnOptions.bind(this)"
    (selectedElementIdChange)="selectElementById($event)"
    (applySelectedElement)="applySelectedElement($event)"
  ></andp-preview-form>
</div>
