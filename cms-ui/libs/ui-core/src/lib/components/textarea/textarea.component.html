<gtx-form-element-container
    [disabled]="disabled"
    [readonly]="readonly"
>
    <label [attr.for]="id">{{ label }}</label>

    <textarea
        #textarea

        autosize
        [minRows]="1"

        [attr.id]="id"
        [attr.maxlength]="maxlength"
        [attr.name]="name"
        [attr.placeholder]="placeholder"

        [disabled]="disabled"
        [readonly]="readonly"
        [required]="required"
        [value]="value || ''"

        (input)="textAreaInputHandler($event)"
        (blur)="blurHandler()"
    ></textarea>
</gtx-form-element-container>
