<div class="list-header">
  <gtx-checkbox
    [value]="areAllSelected()"
    [label]="'common.select_all_label' | gtxI18n"
    (valueChange)="toggleSelectall()"
  ></gtx-checkbox>
</div>

<div class="list-body" [style.maxHeight]="maxHeight">
  @for (user of users; track user.id) {
    <gtx-contents-list-item
      class="user-entry"
      [attr.data-id]="user.id"
      >
      <gtx-checkbox
        class="row-checkbox"
        [value]="selectedMap[user.id]"
        (valueChange)="toggleSelect(user.id)"
      ></gtx-checkbox>
      <div class="item-primary">
        {{ user.firstName }} {{ user.lastName }}
      </div>
    </gtx-contents-list-item>
  }
</div>
