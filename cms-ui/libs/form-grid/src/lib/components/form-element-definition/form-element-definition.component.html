<div class="definition-section">
    <div class="definition-fields">
        <gtx-select
            [label]="'form_grid.definition_control_type' | gtxI18n"
            [value]="schemaDraft().type ?? null"
            [disabled]="disabled()"
            (valueChange)="updateDraft({ type: $any($event) })"
        >
            @for (ctlEntry of (controls() | gtxEntries); track ctlEntry.key) {
                <gtx-option [value]="ctlEntry.key">{{ ctlEntry.value.labelI18n | gtxI18nObject }}</gtx-option>
            }
        </gtx-select>

        <gtx-input
            [label]="'form_grid.definition_name' | gtxI18n"
            [value]="schemaDraft().name ?? null"
            [disabled]="disabled()"
            (valueChange)="updateDraft({ name: $any($event) })"
        ></gtx-input>
    </div>

    <div class="definition-checkboxes">
        <gtx-checkbox
            [label]="'form_grid.definition_mandatory' | gtxI18n"
            [checked]="schemaDraft().mandatory ?? false"
            [disabled]="disabled()"
            (change)="updateDraft({ mandatory: $event === true })"
        ></gtx-checkbox>

        <gtx-checkbox
            [label]="'form_grid.definition_sync_on_change' | gtxI18n"
            [checked]="schemaDraft().updateOnChange ?? false"
            [disabled]="disabled()"
            (change)="updateDraft({ updateOnChange: $event === true })"
        ></gtx-checkbox>

        <gtx-checkbox
            [label]="'form_grid.definition_multivalue' | gtxI18n"
            [checked]="schemaDraft().isList ?? false"
            [disabled]="disabled()"
            (change)="updateDraft({ isList: $event === true })"
        ></gtx-checkbox>
    </div>
</div>
