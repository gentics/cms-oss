<div class="settings-container">
    <gtx-form-condition-input
        class="settings-entry"
        [label]="'form_grid.definition_condition' | gtxI18n"
        [schema]="schema()"
        [elementMap]="elementMap()"
        [element]="element()"
        [elementConfig]="elementConfig()"
        [value]="element()?.formGridOptions?.condition"
        (valueChange)="updateSettingValue('condition', $event)"
    />

    <gtx-dynamic-form-settings
        class="settings-entry"
        [config]="config()"
        [settings]="visibleSettings()"
        [data]="element().formGridOptions || {}"
        [disabled]="disabled()"
        (dataChange)="updateFormGridOptions($event)"
    />
</div>
