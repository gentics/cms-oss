<div class="settings-container">
    @if (mode() === FormGridEditMode.FULL || elementSchema() == null) {
        <gtx-form-condition-input
            class="settings-entry"
            [label]="'form_grid.definition_condition' | gtxI18n"
            [schema]="schema()"
            [elementMap]="elementMap()"
            [element]="element()"
            [elementConfig]="elementConfig()"
            [value]="element()?.formGridOptions?.condition"
            (valueChange)="updateSettingValue('condition', $event)"
        />
    }

    <gtx-dynamic-form-settings
        class="settings-entry"
        [config]="config()"
        [settings]="visibleSettings()"
        [element]="element()"
        [elementConfig]="elementConfig()"
        [elementSchema]="elementSchema()"
        [disabled]="mode() === FormGridEditMode.NONE"
        [languages]="languages()"
        (elementChange)="element.set($event)"
        (validChange)="validChange.emit($event)"
    />
</div>
