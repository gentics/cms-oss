@if (tagProperty) {
  <div class="tag-part-editor">
    <browse-box
            [label]="tagPart | tagPropLabel"
            [displayValue]="!formFeatureActive ? ('editor.form_feature_not_available' | gtxI18n) : (internalFormDisplayValue$ | async)"
            [disabled]="!formFeatureActive || readOnly"
      (clear)="changeSelectedForm(null)"
      (browse)="browseForForm()"
    ></browse-box>
  </div>
}
