<div class="password-confirm-content">
    <gtx-input
        class="pw-input main-input"
        data-control="main"
        [label]="label"
        [type]="allowVisibility && visible ? 'text' : 'password'"
        [value]="actualPassword"
        [disabled]="disabled"
        [class.has-addon]="allowVisibility"
        (valueChange)="updatePassword($event)"
        (focus)="handleFocus($event)"
        (blur)="handleBlur($event)"
    >
        @if (allowVisibility) {
            <button class="addon-button" data-action="toggle-visibility" (click)="toggleVisibility()">
                <icon>{{ visible ? 'visibility_off' : 'visibility' }}</icon>
            </button>
        }
    </gtx-input>

    <gtx-input
        class="pw-input"
        data-control="confirm"
        [label]="confirmLabel ? confirmLabel : ('common.confirm_addition' | gtxI18n: { label: label })"
        [type]="allowVisibility && visible ? 'text' : 'password'"
        [disabled]="disabled || actualPassword === ''"
        [value]="confirmationValue"
        (valueChange)="updateConfirmation($event)"
        (focus)="handleFocus($event)"
        (blur)="handleBlur($event)"
    ></gtx-input>
</div>

@if (!valid) {
    <div class="missmatch-error">
        {{ missmatchText ? missmatchText : ('common.password_missmatch' | gtxI18n) }}
    </div>
}
