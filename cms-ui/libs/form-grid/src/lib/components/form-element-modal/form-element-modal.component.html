<div class="modal-title" *ngIf="isModalMode">
  <h5>Formular Element bearbeiten</h5>
</div>

<div class="panel-title" *ngIf="isPanelMode">
  <h5>{{ panelTitle}}</h5>
</div>
<div class="modal-content">

  <ng-template #dynamicComponentContainer></ng-template>

  <ng-container *ngIf="!hasAnyEditOptions">
    <p>Keine Bearbeitungsoptionen verfügbar</p>
  </ng-container>

  <ng-container *ngIf="hasUploadConstraintOptions">
    <p>Erlaubte Dateiendungen:</p>
    <ng-container *ngFor="let fileExtensionsAllowedelection of fileExtensionsAllowedSelections">
      <gtx-checkbox [(ngModel)]="fileExtensionsAllowedelection.enabled" label="{{fileExtensionsAllowedelection.extension}}"></gtx-checkbox>
    </ng-container>
  </ng-container>

  <ng-container *ngIf="hasOverlayOptions">
    <!-- Overlay Options -->
    <section class="overlayOptions">
      <h6><strong>Overlay Optionen</strong></h6>
      <gtx-checkbox label="Overlay beim Verlassen des Feldes anzeigen?"
                    [(ngModel)]="element.formGridOptions.overlayOptions.isShowOverlay"></gtx-checkbox>
      <div *ngFor="let locale of this.locales;">
        <p>Sprache: {{ locale }}</p>
        <label class="aloha-label">Text vor dem Feldwert {{ locale }}</label>
        <div class="aloha-editable" id="overlayOptions_textPre-{{ locale }}"></div>

        <label class="aloha-label">Text nach dem Feldwert {{ locale }}</label>
        <div class="aloha-editable" id="overlayOptions_textPost-{{ locale }}"></div>
      </div>
    </section>
  </ng-container>
</div>

<div class="modal-footer action-footer" *ngIf="isModalMode">
  <gtx-button class="action-btn action-btn-primary" type="primary" (click)="edit()">
    {{ saveLabel }}
  </gtx-button>
  <gtx-button class="action-btn action-btn-secondary" type="secondary" (click)="cancel()">
    {{ cancelLabel }}
  </gtx-button>
</div>

<div class="panel-footer action-footer action-footer-panel" *ngIf="isPanelMode && hasAnyEditOptions">
  <gtx-button class="action-btn action-btn-primary" type="primary" (click)="edit()" *ngIf="hasAnyEditOptions">
    {{ saveLabel }}
  </gtx-button>
</div>
