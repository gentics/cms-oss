<div class="table-wrapper" *ngIf="keys.length > 0; else empty" data-region="translations-table">
  <table class="translations">
    <thead>
      <tr>
        <th class="col-key">{{ 'TABLE.HEADER_PLACEHOLDER' | gtxI18n }}</th>
        <th class="col-lang" *ngFor="let lang of languages; trackBy: trackLang" [attr.data-lang]="lang.code">
          {{ lang.name }}
          <span class="lang-meta">({{ lang.code }})</span>
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let key of keys; trackBy: trackKey" [attr.data-id]="key" data-name="row">
        <td class="col-key">
          <span class="placeholder-key" data-name="key">{{ key }}</span>
        </td>
        <td *ngFor="let lang of languages; trackBy: trackLang" [attr.data-lang]="lang.code" data-name="cell">
          <div
            class="cell-input-wrapper"
            [attr.data-state]="getCellState(key, lang.code)"
            [class.is-dirty]="getCellState(key, lang.code) === 'dirty'"
            [class.is-empty]="getCellState(key, lang.code) === 'empty'">
            <input
              type="text"
              data-action="edit-cell"
              [attr.data-key]="key"
              [attr.data-lang]="lang.code"
              [value]="getValue(key, lang.code)"
              [placeholder]="key"
              (input)="onInput(key, lang.code, $event)" />
            <span class="cell-indicator" aria-hidden="true">
              <ng-container [ngSwitch]="getCellState(key, lang.code)">
                <ng-container *ngSwitchCase="'dirty'">●</ng-container>
                <ng-container *ngSwitchCase="'empty'">—</ng-container>
              </ng-container>
            </span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<ng-template #empty>
  <div class="pm-empty-state" data-name="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <h3>{{ 'TABLE.EMPTY_TITLE' | gtxI18n }}</h3>
    <p>{{ 'TABLE.EMPTY_DESC' | gtxI18n }}</p>
  </div>
</ng-template>
