<input
    #input
    type="radio"
    tabindex="0"
    [attr.id]="id || UNIQUE_ID"
    [attr.name]="name"
    [checked]="checked"
    [disabled]="disabled"
    [required]="required"
    [value]="value || ''"
    [class.tabbed]="tabbedFocus"

    (focus)="handleFocus($event)"
    (blur)="handleBlur($event)"
    (change)="onInputChecked($event, input)"
/>

<label [attr.for]="id || UNIQUE_ID" (click)="input.click()">
    <span class="indicator"></span>
    @if (label) {
        <span class="label-content">{{ label }}</span>
    }
</label>
