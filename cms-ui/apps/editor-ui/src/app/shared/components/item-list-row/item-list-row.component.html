<gtx-contents-list-item
    *ngIf="item != null"
    class="item-row icon-checkbox-trigger"
    [class.selected]="selected"
    [class.deleted]="itemIdDeleted"
    [class.item-in-editor]="item === itemInEditor"
    [attr.data-item-type]="itemType"
    [attr.data-id]="item.id"
    [attr.data-global-id]="item.globalId"
>
    <icon-checkbox
        *ngIf="itemType !== 'image'; else imageCheckbox"
        [disabled]="!canBeSelected"
        [selected]="selected"
        [icon]="icon"
        (change)="toggleSelect()"
    ></icon-checkbox>

    <ng-template #imageCheckbox>
        <icon-checkbox
            [selected]="selected"
            (change)="toggleSelect()"
            [image]="item"
            [nodeId]="nodeId"
        ></icon-checkbox>
    </ng-template>

    <gtx-language-state
        *ngIf="activeLanguage
            && nodeLanguages?.length > 1
            && showStatusIcons
            && languageState
            && (itemType === 'page' || itemType === 'form')"
        [language]="languageState"
        [activeLanguage]="activeLanguage"
        [state]="languageState"
        [mode]="uiMode"
        [showIndicators]="true"
        [showDeleted]="showDeleted"
    ></gtx-language-state>

    <div
        #itemPrimary
        class="item-primary"
    >
        <ng-template #itemName>
            <div class="item-name">
                <icon
                    *ngIf="item?.inherited"
                    class="inherited-icon"
                    [title]="'editor.inherited_tooltip' | i18n:{ master: item?.inheritedFrom }"
                >input</icon>
                <icon
                    *ngIf="item | itemIsLocalized"
                    class="localized-icon"
                    [title]="'editor.localized_tooltip' | i18n:{ master: item?.masterNode }"
                >file_copy</icon>

                <ng-container *ngIf="
                    (mode === ItemListRowMode.SELECT || itemIdDeleted || uiMode === UIMode.STAGING)
                    && item.type !== 'folder';
                    else itemLinkTemplate"
                >
                    <span
                        class="item-name-only"
                        [innerHTML]="item?.name | highlight:filterTerm"
                        (click)="itemClicked($event, item)"
                    ></span>
                </ng-container>

                <ng-template #itemLinkTemplate>
                    <a
                        href=""
                        class="item-name-only item-name-router-link"
                        [routerLink]="mode === ItemListRowMode.SELECT ? null : (item | routerCommandsForItem)"
                        [title]="item?.description"
                        [innerHTML]="item?.name | highlight:filterTerm"
                        (click)="itemClicked($event, item)"
                    ></a>
                </ng-template>

                <ng-container *ngIf="uiMode === UIMode.EDIT && item">
                    <item-status-label
                        *ngIf="item.type === 'page' || item.type === 'form'"
                        [item]="item"
                        [nodeLanguages]="nodeLanguages"
                        [activeNodeId]="activeNode?.id"
                        [uiMode]="uiMode"
                        [stagingMap]="stagingMap"
                    ></item-status-label>

                    <file-status-label
                        *ngIf="item.type === 'image' || item.type === 'file'"
                        [item]="item"
                    ></file-status-label>
                </ng-container>

                <start-page-icon *ngIf="(item | isStartPage: startPageId)"></start-page-icon>

                <a
                    *ngIf="(!itemIdDeleted && (itemType === 'page' || itemType === 'file' || itemType === 'image') && item['liveUrl'] && item['liveUrl'] !== '')"
                    [href]="item['liveUrl']"
                    target="_blank"
                    class="liveurl-icon"
                    [title]="'editor.live_url_tooltip' | i18n"
                >
                    <gtx-button icon size="small" type="secondary">
                        <icon>open_in_new</icon>
                    </gtx-button>
                </a>
            </div>
        </ng-template>

        <ng-container *ngIf="itemType === 'image'; else itemName">
            <image-thumbnail-tooltip
                [image]="item"
                [nodeId]="nodeId"
                [parent]="itemPrimary"
            >
                <ng-content *ngTemplateOutlet="itemName"></ng-content>
            </image-thumbnail-tooltip>
        </ng-container>

        <ng-container *ngIf="searching">
            <item-breadcrumbs
                [item]="item"
                [linkPaths]="mode !== ItemListRowMode.SELECT"
            ></item-breadcrumbs>
        </ng-container>

        <ng-container *ngIf="getItemDetailsShowPaths() && itemType !== 'folder'">
            <div
                class="file-name"
                [title]="item | itemPath:activeNode?.name"
                [innerHTML]="item | itemPath:activeNode?.name | highlight:filterTerm"
            ></div>
        </ng-container>

        <div
            *ngIf="item != null
                && (item.type === 'page' || item.type === 'form')
                && nodeLanguages?.length > 1
                && activeLanguage != null"
            class="language-indicator"
        >
            <page-language-indicator
                *ngIf="item.type === 'page'"
                [languages]="nodeLanguages"
                [activeLanguage]="activeLanguage"
                [page]="item"
                [permissions]="permissions"
                [mode]="mode"
                [uiMode]="uiMode"
                [stagingMap]="stagingMap"
                [displayStatusInfo]="showStatusIcons || uiMode === UIMode.STAGING"
                [displayDeleted]="showDeleted"
                [expandByDefault]="expandByDefault"
                (languageClick)="pageLanguageClicked($event)"
                (languageIconClick)="onPageLanguageIconClicked($event)"
            ></page-language-indicator>

            <form-language-indicator
                *ngIf="item.type === 'form'"
                [languages]="nodeLanguages"
                [activeLanguage]="activeLanguage"
                [form]="item"
                [permissions]="permissions"
                [mode]="mode"
                [uiMode]="uiMode"
                [stagingMap]="stagingMap"
                [displayStatusInfo]="showStatusIcons || uiMode === UIMode.STAGING"
                [displayDeleted]="showDeleted"
                [expandByDefault]="expandByDefault"
                (languageClick)="formLanguageClicked($event)"
                (languageIconClick)="onFormLanguageIconClicked($event)"
            ></form-language-indicator>
        </div>
    </div>

    <div class="display-fields">
        <list-item-details
            [fields]="getItemDetailsDisplayFields()"
            [item]="item"
            [isDeleted]="itemIdDeleted"
            (usageClick)="showUsage($event)"
        ></list-item-details>
    </div>

    <div class="show-on-hover">
        <favourite-toggle [item]="item"></favourite-toggle>

        <item-context-menu
            *ngIf="mode !== ItemListRowMode.SELECT"
            class="context-menu"
            [item]="item"
            [activeNode]="activeNode"
            [isFolderStartPage]="itemType === 'page' && item.id === startPageId"
            [isLocked]="itemType === 'page' && item | pageIsLocked"
            [isDeleted]="itemIdDeleted"
            [permissions]="permissions | gtxMapPermissions"
            [uiMode]="uiMode"
            [stagingMap]="stagingMap"
        ></item-context-menu>
    </div>
</gtx-contents-list-item>
