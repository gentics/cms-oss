<div class="dynamic-settings-list">
    @for (setting of (visibleSettings()); track setting.id) {
        @switch (setting.type) {
            @case ("translation") {
                <gtx-i18n-input
                    class="settings-entry"
                    [attr.data-control]="setting.id"
                    [attr.data-control-type]="setting.type"
                    [label]="setting.labelI18n | gtxI18nObject"
                    [value]="data()[setting.id]"
                    [language]="selectedLanguage()"
                    [availableLanguages]="languages()"
                    [disabled]="disabled()"
                    (valueChange)="updateTranslationSetting(setting.id, $event)"
                ></gtx-i18n-input>
            }

            @case ("options") {
                <div class="settings-entry option-translation">
                    <span class="option-translation-title">{{ setting.labelI18n | gtxI18nObject }}</span>

                    <div class="option-translation-entries">
                        @for (opt of data()[setting.id] || []; track opt.value) {
                            <gtx-i18n-input
                                class="option-translation-input"
                                [attr.data-control]="setting.id"
                                [attr.data-control-type]="setting.type"
                                [label]="opt.value"
                                [value]="opt.label"
                                [language]="selectedLanguage()"
                                [availableLanguages]="languages()"
                                [disabled]="disabled()"
                                (valueChange)="updateOptionLabel(setting.id, $index, $event)"
                            ></gtx-i18n-input>
                        }
                    </div>
                </div>
            }
        }
    }
</div>
