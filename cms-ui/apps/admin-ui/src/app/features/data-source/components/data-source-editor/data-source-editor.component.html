<div class="gtx-entity-detail">
  <gtx-tabs pure [activeId]="editorTab">
    <gtx-tab
      [id]="Tabs.PROPERTIES"
      gtxDetailTabLink
      [title]="'shared.title_properties' | gtxI18n"
      >
      <div class="detail-tab-wrapper">
        <gtx-entity-detail-header
          [title]="'shared.title_properties_of_entity' | gtxI18n: { entityName: entity?.name }"
          saveActionAllowedId="dataSource.updateDataSourceInstance"
          [saveActionAllowedInstanceId]="entity?.id"
          [saveDisabled]="fgProperties?.pristine || fgProperties?.invalid"
          (saveClick)="tabHandles?.[Tabs.PROPERTIES]?.save?.()"
          (cancelClick)="detailsClose()"
        ></gtx-entity-detail-header>

        <div class="gtx-entity-details-tab-content-body">
          @if (entity) {
            <gtx-data-source-properties
              class="properties"
              [formControl]="fgProperties"
              [pureInitialValue]="true"
              [(initialValue)]="entityIsClean"
            ></gtx-data-source-properties>
          }
        </div>
      </div>
    </gtx-tab>

    <gtx-tab
      [id]="Tabs.ENTRIES"
      gtxDetailTabLink
      [title]="'shared.title_entries' | gtxI18n"
      >
      <div class="detail-tab-wrapper">
        <gtx-entity-detail-header
          [hidden]="isLoading"
          [title]="'shared.title_entries_of_entity' | gtxI18n: { entityName: entity?.name }"
          saveActionAllowedId="dataSource.updateDataSourceInstance"
          [saveActionAllowedInstanceId]="entity?.id"
          [saveDisabled]="!entriesChanged"
          (saveClick)="tabHandles?.[Tabs.ENTRIES]?.save?.()"
          (cancelClick)="detailsClose()"
        ></gtx-entity-detail-header>

        <div class="gtx-entity-details-tab-content-body">
          @if (permissionDataSourceEntryRead$ | async) {
            <gtx-data-source-entry-table
              [dataSourceId]="entity.id"
              [rows]="entryRows"
              [sorting]="true"
              (sort)="sortDataSourceEntry($event)"
              (loadEnd)="entriesLoaded($event)"
            ></gtx-data-source-entry-table>
          } @else {
            <ng-container [ngTemplateOutlet]="unauthorized"></ng-container>
          }
        </div>
      </div>
    </gtx-tab>

    <gtx-tab
      [id]="Tabs.USAGE_OVERVIEW"
      gtxDetailTabLink
      [title]="'shared.title_usage_overview' | gtxI18n"
      >
      <div class="detail-tab-wrapper">
        <gtx-entity-detail-header
          [title]="'shared.title_usage_overview_of_entity' | gtxI18n: { entityName: entity?.name }"
          (cancelClick)="detailsClose()"
        ></gtx-entity-detail-header>

        <div class="gtx-entity-details-tab-content-body">
          @if (permissionDataSourceEntryRead$ | async) {
            <gtx-construct-table
              [showSearch]="true"
              [hideActions]="true"
              [selectable]="false"
              [dataSourceId]="entity.id"
            ></gtx-construct-table>
          } @else {
            <ng-container [ngTemplateOutlet]="unauthorized"></ng-container>
          }
        </div>
      </div>
    </gtx-tab>
  </gtx-tabs>
</div>

<ng-template #unauthorized>
  <div class="message-unauthorized">
    <h5>{{ 'common.general_permission_required' | gtxI18n }}</h5>
    <icon>warning</icon>
  </div>
</ng-template>
