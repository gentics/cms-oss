<div
    class="content-list form"
    [class.empty]="items()?.length === 0"
    [attr.data-item-type]="external() ? 'external_form' : 'form'"
    [attr.data-ui-mode]="uiMode()"
>
    <gtx-form-list-header
        class="list-header"
        [permissions]="permissions() | gtxMapPermissions"
        [folderId]="folderId()"
        [node]="node()"
        [external]="external()"
        [nodeLanguages]="nodeLanguages()"

        [pageSize]="pageSize()"
        [totalCount]="totalCount()"
        [currentPage]="currentPage()"
        [currentPageItems]="items()"
        [selectedItems]="selectedItems()"
        [selection]="selection()"
        [sortBy]="sortBy()"
        [sortOrder]="sortOrder()"

        [showAllLanguages]="showAllLanguages()"
        [showStatusIcons]="showStatusIcons()"
        [wastebinEnabled]="wastebinEnabled()"
        [showDeleted]="showDeleted()"
        [filterTerm]="filterTerm()"
        [elasticSearchQueryActive]="elasticSearchQueryActive()"
        [displayFields]="displayFields()"

        [uiMode]="uiMode()"
        [collapsed]="collapsed()"
        (collapsedChange)="collapsed.set($event)"

        (toggleAllSelection)="toggleAllSelection($event)"
        (requestReload)="reload()"
    />

    <gtx-progress-bar [active]="loadingItems()" />

    <div class="list-body" [class.collapsed]="collapsed()" [hidden]="loadingItems()">
        @for (singleItem of items() | paginate:{
            id: UNIQUE_ID,
            currentPage: currentPage(),
            itemsPerPage: pageSize(),
            totalItems: totalCount(),
        }; track singleItem.id) {
            <item-list-row
                [item]="singleItem"
                [activeNode]="node()"
                [nodeId]="node()?.id"
                [selected]="selection() | gtxIncludes:singleItem.id"
                (selectedChange)="updateItemSelection(singleItem.id, $event)"
                [permissions]="permissions()"
                [nodeLanguages]="nodeLanguages()"
                [activeItemId]="activeItemId()"

                [itemsInfo]="itemsInfo()"
                [icon]="'list_alt'"
                [itemType]="'form'"

                [uiMode]="uiMode()"
                [searching]="searchTerm() || elasticSearchQueryActive()"
                [linkPaths]="!!searchTerm()"
                [expandByDefault]="showAllLanguages()"
                [showStatusIcons]="showStatusIcons()"
                [showDeleted]="showDeleted()"
                [filterTerm]="filterTerm()"

                [stagingMap]="stagingMap()"
            />
        }

        <div class="paginate-wrapper">
            <paging-controls [id]="UNIQUE_ID" (pageChange)="loadPage($event)"></paging-controls>

            @if (totalCount() > 10) {
                <gtx-page-size-selector
                    [size]="pageSize()"
                    (sizeChange)="updatePageSize($event)"
                ></gtx-page-size-selector>
            }
        </div>
    </div>
</div>
