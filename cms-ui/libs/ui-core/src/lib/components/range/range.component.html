<div class="range-content">
    @if (label) {
        <label [attr.for]="id">{{ label }}</label>
    }

    <div #rangeField class="range-field" [class.with-bounds]="showBounds">
        @if (showBounds) {
            <div class="bounds-container">
                @if (min != null) {
                    <span class="bounds-display min">{{ min }}</span>
                }
                @if (max != null) {
                    <span class="bounds-display max">{{ max }}</span>
                }
            </div>
        }

        <div class="indicator-container">
            @if (showIndicators) {
                <div
                    class="indicator-stripes"
                    [style.--gtx-step-count]="(max / (indicatorSteps ?? step) - (indicatorSteps ? 0 : 1))"
                ></div>
            }

            @if (showThumb) {
                <span
                    class="thumb"
                    [class.active]="active"
                    [style.left]="thumbOffset"
                >
                    <span class="value">{{ value }}</span>
                </span>
            }
        </div>

        <div class="input-container">
            <input
                type="range"
                [attr.max]="max"
                [attr.min]="min"
                [attr.step]="step"

                [attr.name]="name"
                [attr.id]="id"

                [required]="required"
                [disabled]="disabled"
                [value]="value"

                (input)="onInput($event)"
                (mousedown)="onMousedown($event)"
                (mouseup)="onMouseup()"
                (mousemove)="onMousemove($event)"
            />
        </div>
    </div>
</div>
