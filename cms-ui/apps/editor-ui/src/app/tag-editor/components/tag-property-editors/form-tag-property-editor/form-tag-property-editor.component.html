@if (tagProperty) {
    <div class="tag-part-editor">
        <gtx-browse-box
            [label]="tagPart | tagPropLabel"
            [placeholder]="'editor.form_no_selection' | gtxI18n"
            [disabled]="readOnly"
            [allowedSelection]="'form'"
            [selectMultiple]="false"
            [value]="selectedInternalForm.selectedItem$ | async"
            (valueChange)="changeSelectedForm($event)"
        ></gtx-browse-box>
    </div>
}
