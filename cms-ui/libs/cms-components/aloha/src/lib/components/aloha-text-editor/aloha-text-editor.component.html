<gtx-form-element-container [disabled]="disabled" [class.active]="state === IFrameState.INITIALIZED && isFocused">
    @if (label) {
        <label (click)="focusAloha()">{{ label }}</label>
    }

    <div class="toolbar">
        hi im toolbar :)
    </div>

    <div
        class="aloha-container"
        [ngClass]="'state-' + state"
        [class.active]="state === IFrameState.INITIALIZED && isFocused"
        [style.--gtx-content-height.px]="contentHeight"
        (click)="focusAloha($event)"
    >
        <div class="content-container">
            <iframe #host class="aloha-frame"></iframe>

            <div
                class="content"
                [innerHTML]="value | safe:'html'"
            ></div>
        </div>
    </div>
</gtx-form-element-container>
